<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  width:1200px;height:630px;overflow:hidden;
  background:#0E141E;color:#E9EEF4;
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
  display:flex;align-items:center;
}
.serif{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif}
.mono{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-variant-numeric:tabular-nums}
.left{flex:1.1;padding:0 0 0 84px;position:relative;z-index:2}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:44px}
.swatch{width:20px;height:20px;background:#F0A63A;border-radius:4px}
.brand b{font-size:28px;font-weight:600;letter-spacing:.08em}
.brand span{font-size:13px;color:#93A1B3;letter-spacing:.24em;margin-top:6px}
h1{font-size:64px;font-weight:600;line-height:1.42;letter-spacing:.02em;margin-bottom:30px}
h1 em{font-style:normal;color:#F0A63A}
.meter{display:flex;align-items:baseline;gap:16px;margin-bottom:34px}
.meter .big{font-size:40px}
.meter .big b{color:#F0A63A;font-weight:700}
.meter .pct{font-size:20px;color:#93A1B3}
.pill{display:inline-block;font-size:19px;letter-spacing:.1em;color:#F0A63A;border:2px solid #F0A63A;border-radius:999px;padding:10px 28px}
.right{flex:1;height:630px;position:relative}
.right svg{position:absolute;top:-30px;left:-130px;width:800px;height:800px}
.prefecture{fill:#18212D;stroke:#2E3B4C;stroke-width:1}
.prefecture.on{fill:#F0A63A;stroke:#D4881B}
.boundary-line{display:none}
</style>
</head>
<body>
  <div class="left">
    <div class="brand"><span class="swatch"></span><b class="serif">塗り旅</b><span>NURITABI</span></div>
    <h1 class="serif">行った場所で、<br>日本を<em>塗れ</em>。</h1>
    <div class="meter mono"><span class="big"><b>07</b> / 47</span><span class="pct">14.9%</span></div>
    <span class="pill">β事前登録 受付中</span>
  </div>
  <div class="right">
    <!--JAPAN_MAP_SVG-->
  </div>
<script>
  [11,9,7,6,4,3,2].forEach(function(c){
    var g=document.querySelector('.prefecture[data-code="'+c+'"]');
    if(g)g.classList.add("on");
  });
</script>
</body>
</html>
