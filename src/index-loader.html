<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>塗り旅（ヌリタビ）— 行った場所で、日本を塗れ。</title>
<meta name="description" content="旅程づくりから訪問の記録、地図の塗りつぶしまで。ロングドライブのための旅程×制覇記録サービス「塗り旅」。βの事前登録を受付中。">
<!-- OGP はローダーに置く（クローラは JS を実行しないため、共有カードはここから出る）。
     カスタムドメイン移行時は og:url / og:image を差し替え -->
<meta property="og:type" content="website">
<meta property="og:title" content="塗り旅（ヌリタビ）— 行った場所で、日本を塗れ。">
<meta property="og:description" content="旅の計画から訪問の記録、そして地図の塗りつぶしへ。ロングドライブのための制覇マップ。β事前登録受付中。">
<meta property="og:url" content="https://nuritabi-lp.pages.dev/">
<meta property="og:image" content="https://nuritabi-lp.pages.dev/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='3' fill='%23F0A63A'/%3E%3C/svg%3E">
<style>body{margin:0;background:#0E141E}</style>
</head>
<body>
<script>
// 開くたびに違うデザインへ振り分けるマイクロローダー
// ?v=N で固定（SNS 投稿でターゲット別に出し分ける用）。指定なしは前回と違うものをランダム
(function(){
  var N=__VARIANT_COUNT__; // build.mjs が実数に置換
  var KEY="nuritabi.lastv";
  var q=+(new URLSearchParams(location.search).get("v")||0);
  var v=(q>=1&&q<=N)?q:0;
  if(!v){
    var last=0;
    try{last=+(localStorage.getItem(KEY)||0)}catch(e){}
    do{v=1+Math.floor(Math.random()*N)}while(N>1&&v===last);
  }
  try{localStorage.setItem(KEY,String(v))}catch(e){}
  location.replace("v"+v+".html"+location.hash);
})();
</script>
<noscript>
  <p style="color:#E9EEF4;font-family:sans-serif;padding:24px">
    塗り旅（ヌリタビ）— 行った場所で、日本を塗れ。<br>
    <a href="v1.html" style="color:#F0A63A">→ ページを開く</a>
  </p>
</noscript>
</body>
</html>
