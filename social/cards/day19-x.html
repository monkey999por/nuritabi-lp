<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{gap:30px;justify-content:center}
h1{font-size:52px;text-align:center}
.strip{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;flex:none}
.koma{padding:30px 28px;display:flex;flex-direction:column;gap:14px;min-height:330px}
.koma .no{font-family:"Mochiy Pop One",sans-serif;font-size:22px;display:inline-block;background:var(--ink);color:var(--bg);padding:2px 18px;transform:rotate(-1.5deg);align-self:flex-start}
.koma h2{font-size:36px}
.koma p{font-family:"Yusei Magic",sans-serif;font-size:24px;color:#3d3a30;line-height:1.9}
.koma .fukidashi{font-size:22px;align-self:flex-end;margin-top:auto}
.koma:nth-child(1){transform:rotate(-.6deg)}
.koma:nth-child(2){transform:rotate(.5deg)}
.koma:nth-child(3){transform:rotate(-.4deg)}
</style></head>
<body class="t-manga sz-x">
<div class="card">
  <h1>登録、<em>10秒で終わる</em>3コマ。</h1>
  <div class="strip">
    <div class="koma"><span class="no">1コマ目</span><h2>LPを開く</h2><p>michip-lp.pages.dev を開く。デザインは5種のどれかが出る。</p><span class="fukidashi">ガチャ<b>なんかい</b>。</span></div>
    <div class="koma"><span class="no">2コマ目</span><h2>メールを入れる</h2><p>フォームにメールアドレスを一本。名前も住所も要らん。</p><span class="fukidashi">それだけ<b>かい</b>。</span></div>
    <div class="koma"><span class="no">3コマ目</span><h2>送信</h2><p>おわり。βが出たら登録順に招待が届く。</p><span class="fukidashi">もう終わり<b>かい</b>！</span></div>
  </div>
</div>
<footer class="brand-strip"><span class="mark">ツ</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">登録するんかい（無料）</span></footer>
</body></html>
