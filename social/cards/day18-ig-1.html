<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center}
.signboard{padding:52px 56px;display:flex;flex-direction:column;gap:26px;position:relative}
.head{display:flex;align-items:baseline;gap:20px;border-bottom:4px solid rgba(253,254,253,.4);padding-bottom:18px}
.head h1{font-size:44px;letter-spacing:.1em}
.head .en{font-size:20px;opacity:.7}
.badge{position:absolute;top:-22px;right:34px;font-size:24px;letter-spacing:.14em;color:#3a3100;background:var(--yellow);border:4px solid #22262a;border-radius:8px;padding:8px 24px;box-shadow:0 6px 14px rgba(0,0,0,.35)}
.mock{background:rgba(253,254,253,.94);border-radius:12px;padding:26px;display:flex;flex-direction:column;gap:18px;color:#22302a}
.feed{display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #d3ddd0;border-radius:12px;padding:16px 20px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--green);flex:none;border:4px solid #fff;box-shadow:0 0 0 3px var(--green)}
.feed:nth-child(2) .avatar{background:var(--blue);box-shadow:0 0 0 3px var(--blue)}
.fb{flex:1;min-width:0}
.fb b{font-size:25px;display:block}
.fb small{font-size:20px;color:#5c6b62}
.mini-route{height:38px;margin-top:6px}
.mini-route polyline{stroke:var(--green)}
.mini-route circle{fill:#e8a80c}
.foot{font-size:20px;color:#5c6b62;align-self:flex-end;font-family:"Overpass",sans-serif;font-weight:800}
h2{font-size:40px;color:var(--white)}
h2 .dist{font-family:"Overpass",sans-serif;font-size:28px;margin-left:18px;color:var(--yellow)}
.body{font-size:25px;color:rgba(253,254,253,.88);line-height:1.95}
</style></head>
<body class="t-hwy sz-ig">
<div class="card">
  <div class="signboard blue">
    <span class="badge">開発中</span>
    <div class="head"><h1>この先のサービスエリア</h1><span class="en">1/3</span></div>
    <div class="mock">
      <div class="feed"><span class="avatar"></span><div class="fb"><b>湯めぐりの人</b><small>東北 5日間・26スポット</small><svg class="mini-route" viewBox="0 0 240 38"><polyline points="12,28 60,18 96,26 140,10 184,16 228,8"/><circle cx="12" cy="28" r="5"/><circle cx="96" cy="26" r="5"/><circle cx="140" cy="10" r="5"/><circle cx="228" cy="8" r="5"/></svg></div><span class="foot">足あと 12</span></div>
      <div class="feed"><span class="avatar"></span><div class="fb"><b>北へゆく人</b><small>日帰り・4スポット</small><svg class="mini-route" viewBox="0 0 240 38"><polyline points="12,28 60,18 96,26 140,10 184,16 228,8"/><circle cx="12" cy="28" r="5"/><circle cx="96" cy="26" r="5"/><circle cx="140" cy="10" r="5"/><circle cx="228" cy="8" r="5"/></svg></div><span class="foot">足あと 5</span></div>
    </div>
    <h2>みんなの旅<span class="dist en">2km</span></h2>
    <p class="body">フォローした人の旅程がフィードに流れてくる。名もないスポットに先客の足あとが付いていたら、それが次の旅のきっかけ。</p>
  </div>
</div>
<footer class="brand-strip"><span class="mark">IC</span><span>ミチップ</span><span class="url">この先、順次開通。</span><span class="cta">1/3</span></footer>
</body></html>
