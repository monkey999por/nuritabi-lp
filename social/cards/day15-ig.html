<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{gap:24px}
h1{font-size:52px;text-align:center}
.grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:20px;min-height:0}
.cell{border:5px solid var(--ink);box-shadow:7px 7px 0 var(--ink);overflow:hidden;background:#fffdf6}
.cell img{width:100%;height:100%;object-fit:cover;object-position:top left;display:block}
.cell.wide{grid-column:span 2}
.cell:nth-child(2){transform:rotate(.5deg)}
.cell:nth-child(4){transform:rotate(-.5deg)}
.cap{text-align:center;font-family:"Yusei Magic",sans-serif;font-size:25px}
.cap b{color:var(--red)}
</style></head>
<body class="t-manga sz-ig">
<div class="card">
  <h1>全5種。<em>中身はおなじ</em>やねん。</h1>
  <div class="grid">
    <div class="cell"><img src="assets/v1-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v2-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v3-hero.png" alt=""></div>
    <div class="cell wide"><img src="assets/v4-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v5-hero.png" alt=""></div>
  </div>
  <p class="cap">開くたびどれかが出る。<b>右下のボタンでガチャ</b>もできる。</p>
</div>
<footer class="brand-strip"><span class="mark">ツ</span><span>ミチップ</span><span class="url">リンクはプロフィールや</span><span class="cta">β登録は無料</span></footer>
</body></html>
