<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;align-items:center}
.pc{width:100%;background:#fffdf4;border:2px solid var(--line);padding:20px 20px 0;box-shadow:0 26px 52px rgba(43,50,66,.22);transform:rotate(-.8deg);position:relative}
.pc::after{content:"MICHIP・道";position:absolute;top:14px;right:18px;width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-size:16px;font-weight:700;letter-spacing:.1em;color:rgba(38,69,107,.55);border:3px solid rgba(38,69,107,.45);transform:rotate(-14deg);z-index:2}
.scene{height:520px;background:linear-gradient(180deg,#f9e2b8 0%,#eebf82 46%,#d98d55 62%,#7e6a52 62.5%,#5e5140 100%);position:relative;overflow:hidden;border:2px solid rgba(38,69,107,.18)}
.scene svg{position:absolute;inset:0;width:100%;height:100%}
h1{font-size:46px;text-align:center;padding:26px 0 8px;color:var(--indigo-deep)}
.body{font-size:25px;color:#4c5364;text-align:center;padding-bottom:26px;line-height:1.9}
</style></head>
<body class="t-retro sz-ig">
<div class="card">
  <div class="pc">
    <div class="scene">
      <svg viewBox="0 0 900 520" preserveAspectRatio="none">
        <circle cx="660" cy="180" r="68" fill="#f5d089" opacity=".9"/>
        <path d="M0 320 Q200 220 420 300 T900 270 V520 H0 Z" fill="#8a6f4a" opacity=".55"/>
        <path d="M0 386 Q270 300 560 372 T900 360 V520 H0 Z" fill="#6d5a3e" opacity=".7"/>
        <path d="M90 458 C270 434 630 434 812 458" fill="none" stroke="#fbf5e6" stroke-width="8" stroke-dasharray="26 22" opacity=".8"/>
        <circle cx="450" cy="448" r="15" fill="#c23524" stroke="#fbf5e6" stroke-width="5"/>
      </svg>
    </div>
    <h1>名前のない展望地</h1>
    <p class="body">看板も駐車場もない。<br>その眺めを知っているのは、行った人だけ。</p>
  </div>
</div>
<footer class="brand-strip"><span class="mark">道</span><span>ミチップ</span><span class="url">映えなくて、結構。</span><span class="cta">1/3</span></footer>
</body></html>
