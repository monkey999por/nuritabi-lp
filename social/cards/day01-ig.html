<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{gap:34px;justify-content:center}
.mapwrap{padding:20px;border-radius:8px}
.map-static{border-radius:4px;overflow:hidden}
h1{font-size:64px;line-height:1.5;text-align:center}
.sub{font-size:26px;color:var(--muted);text-align:center;line-height:1.9}
.chips{display:flex;gap:16px;justify-content:center}
.stat-chip{font-size:20px}
</style></head>
<body class="t-hud sz-ig">
<div class="card">
  <div class="mapwrap bracket"><div class="map-static"><!--TRIP_MAP_SVG--></div></div>
  <h1>ピンを立てて、<br><em>道なり</em>につなぐ。</h1>
  <p class="sub">旅がまるごと、一枚の地図になる。<br>ロングドライブのための旅程記録『ミチップ』</p>
  <div class="chips">
    <span class="stat-chip"><b>5</b> days</span>
    <span class="stat-chip"><b>15</b> spots</span>
    <span class="stat-chip"><b>420</b> km</span>
  </div>
</div>
<footer class="brand-strip"><span class="mark">&gt;_</span><span>michip — ミチップ</span><span class="url">β事前登録 受付中</span><span class="cta">リンクはプロフィールへ</span></footer>
</body></html>
