<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{flex-direction:row;gap:56px;align-items:center}
.left{flex:1}
.kaihatsu{display:inline-block;background:var(--blue);color:#fff;border-radius:6px;padding:4px 22px;font-size:24px;letter-spacing:.16em;transform:rotate(-1.2deg);margin-bottom:22px;box-shadow:4px 4px 0 rgba(59,56,49,.15)}
h1{font-size:58px;line-height:1.6;margin-bottom:22px}
.body{color:#5d584c;font-size:27px;max-width:16.5em}
.right{flex:1;display:flex;flex-direction:column;gap:26px;align-items:center}
.share-url{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:30px;background:#fffdf6;border:3px dashed var(--blue);border-radius:999px;padding:18px 40px;color:var(--blue);box-shadow:4px 5px 0 rgba(59,56,49,.12)}
.people{display:flex;align-items:center;gap:18px}
.avatar{width:64px;height:64px;border-radius:50%;background:var(--red);border:4px solid #fbf6e8;box-shadow:0 0 0 3px var(--red)}
.avatar+.avatar{background:var(--blue);margin-left:-30px;box-shadow:0 0 0 3px var(--blue)}
.people span{font-size:25px;color:#5d584c}
.arrow-doodle{width:220px;height:44px}
.arrow-doodle path{fill:none;stroke:var(--red);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body class="t-note sz-x">
<div class="card">
  <div class="left">
    <p class="kaihatsu">開発予定 — 旅程の共有</p>
    <h1>旅程は、<span class="hl">URLひとつ</span>で渡せる。</h1>
    <p class="body">道連れと同じ地図を見ながら支度して、帰れば<b class="red">おなじ記録</b>が残る。「どこ行く？」の相談が、そのまま旅程になる。</p>
  </div>
  <div class="right">
    <div class="share-url">michip.app/t/tohoku-5days</div>
    <svg class="arrow-doodle" viewBox="0 0 220 44"><path d="M14 8 C60 34 150 36 200 22 M180 10 L204 21 L184 34"/></svg>
    <div class="people"><span class="avatar"></span><span class="avatar"></span><span>道連れと、いっしょに書く</span></div>
  </div>
</div>
<footer class="brand-strip"><span class="mark">記</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">β事前登録 うけつけ中</span></footer>
</body></html>
