<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center}
.signboard{padding:56px 64px;display:flex;flex-direction:column;gap:18px}
.route-line{display:flex;align-items:center;gap:16px;font-size:26px;letter-spacing:.2em;opacity:.85}
.route-line .shield{background:var(--green-deep);border:3px solid var(--white);border-radius:16px 16px 8px 8px;padding:4px 18px;font-size:24px}
h1{font-size:84px;line-height:1.35}
.dirs{border-top:4px solid rgba(253,254,253,.35);padding-top:22px;display:flex;flex-direction:column;gap:12px}
.dir{font-size:34px}
.dir .arrow{font-size:44px;width:56px;text-align:center}
.dir .dist{margin-left:auto;font-size:32px}
.dir.hot{color:var(--yellow)}
</style></head>
<body class="t-hwy sz-x">
<div class="card">
  <div class="signboard">
    <p class="route-line en"><span class="shield">道 1</span>MICHIP EXPRESSWAY — ROUTE MAP FOR LONG DRIVE</p>
    <h1>ピンを立てて、<br><em>道なり</em>につなぐ。</h1>
    <div class="dirs">
      <p class="dir en"><span class="arrow">↑</span>ミチップ β公開<span class="dist">2026</span></p>
      <p class="dir hot en"><span class="arrow">←</span>β事前登録（無料）<span class="dist">300m</span></p>
    </div>
  </div>
</div>
<footer class="brand-strip"><span class="mark">IC</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">β事前登録 受付中</span></footer>
</body></html>
