<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{flex-direction:row;gap:56px;align-items:center}
.left{flex:1.1}
h1{font-size:64px;line-height:1.6;margin-bottom:26px}
.body{color:#5d584c;max-width:15em}
.doodle-line{width:420px;height:22px;margin-top:8px}
.right{flex:.9;display:flex;flex-direction:column;gap:30px}
.sticky{font-size:27px;padding:34px 30px 30px;line-height:1.85}
.sticky .t{display:block;font-size:33px;margin-bottom:8px}
.sticky:nth-child(1){transform:rotate(-1.4deg)}
.sticky:nth-child(2){transform:rotate(1deg)}
.pin-dot{display:inline-block;width:.55em;height:.55em;border-radius:50%;background:var(--red);border:3px solid #fffdf4;box-shadow:0 0 0 3px var(--red);margin-right:.3em}
</style></head>
<body class="t-note sz-x">
<div class="card">
  <div class="left">
    <h1>旅の記録は、<br>まず<span class="hl">ピンいっぽん</span>から。
      <svg class="doodle-line" viewBox="0 0 420 22"><path class="doodle" d="M6 14 C80 4 140 18 210 10 S350 6 414 12"/></svg>
    </h1>
    <p class="body">有名観光地も、たまたま停まった展望地も、おなじ<b class="red">ひとつの点</b>。点が増えるほど、じぶんの旅の跡が見えてくる。</p>
  </div>
  <div class="right">
    <div class="sticky y"><span class="tape"></span><span class="t"><span class="pin-dot"></span>名もない路肩</span>夕日がきれいだった。それだけで、残す理由になる。</div>
    <div class="sticky p"><span class="tape"></span><span class="t"><span class="pin-dot"></span>古い温泉街</span>また来る気がしたから、ぽんとピンを一本。</div>
  </div>
</div>
<footer class="brand-strip"><span class="mark">記</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">β事前登録 うけつけ中</span></footer>
</body></html>
