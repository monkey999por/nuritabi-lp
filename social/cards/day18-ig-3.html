<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center}
.signboard{padding:52px 56px;display:flex;flex-direction:column;gap:26px;position:relative}
.head{display:flex;align-items:baseline;gap:20px;border-bottom:4px solid rgba(253,254,253,.4);padding-bottom:18px}
.head h1{font-size:44px;letter-spacing:.1em}
.head .en{font-size:20px;opacity:.7}
.badge{position:absolute;top:-22px;right:34px;font-size:24px;letter-spacing:.14em;color:#3a3100;background:var(--yellow);border:4px solid #22262a;border-radius:8px;padding:8px 24px;box-shadow:0 6px 14px rgba(0,0,0,.35)}
.mock{background:rgba(253,254,253,.94);border-radius:12px;padding:34px;display:flex;flex-direction:column;gap:24px;align-items:center;color:#22302a}
.share-url{font-family:ui-monospace,"SF Mono",Consolas,monospace;font-size:29px;background:#fff;border:3px dashed var(--blue);border-radius:999px;padding:16px 38px;color:var(--blue)}
.people{display:flex;align-items:center;gap:16px}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--green);border:4px solid #fff;box-shadow:0 0 0 3px var(--green)}
.avatar+.avatar{background:var(--blue);margin-left:-26px;box-shadow:0 0 0 3px var(--blue)}
.people span{font-size:24px;color:#5c6b62}
h2{font-size:40px;color:var(--white)}
h2 .dist{font-family:"Overpass",sans-serif;font-size:28px;margin-left:18px;color:var(--yellow)}
.body{font-size:25px;color:rgba(253,254,253,.88);line-height:1.95}
</style></head>
<body class="t-hwy sz-ig">
<div class="card">
  <div class="signboard blue">
    <span class="badge">開発中</span>
    <div class="head"><h1>この先のサービスエリア</h1><span class="en">3/3</span></div>
    <div class="mock">
      <div class="share-url">michip.app/t/tohoku-5days</div>
      <div class="people"><span class="avatar"></span><span class="avatar"></span><span>同乗者と一緒に編集</span></div>
    </div>
    <h2>旅程の共有<span class="dist en">6km</span></h2>
    <p class="body">旅程はURLひとつで渡せる。同乗者と同じ地図を見ながら支度して、帰ればおなじ記録が残る。</p>
  </div>
</div>
<footer class="brand-strip"><span class="mark">IC</span><span>ミチップ</span><span class="url">この先、順次開通。</span><span class="cta">3/3</span></footer>
</body></html>
