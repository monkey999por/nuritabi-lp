<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;gap:36px}
.stepno{font-size:30px;letter-spacing:.2em;display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:6px 30px;transform:rotate(-1.5deg);align-self:flex-start;box-shadow:5px 5px 0 rgba(59,56,49,.15)}
h1{font-size:78px;line-height:1.5}
.body{font-size:30px;color:#5d584c;line-height:2;max-width:15em}
.mapwrap{border:3px solid rgba(59,56,49,.5);border-radius:6px;overflow:hidden;position:relative;box-shadow:6px 8px 0 rgba(59,56,49,.12);transform:rotate(.5deg)}

<body class="t-note sz-ig">
<div class="card">
  <span class="stepno">つかいかた 3/3</span>
  <h1><span class="hl">残る</span></h1>
  <p class="body">帰るころには、旅行がまるごと1枚の地図に。次の旅を考えるときにも、その跡を見返せる。</p>
  <div class="mapwrap map-static"><span class="tape"></span><!--TRIP_MAP_SVG--></div>
</div>
<footer class="brand-strip"><span class="mark">記</span><span>ミチップ</span><span class="url">計画して、走って、残す。</span><span class="cta">3/3</span></footer>
</body></html>
