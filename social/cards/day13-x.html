<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;gap:40px}
.pipeline{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:44px;color:var(--cyan);text-align:center}
.pipeline .pipe{color:var(--muted);margin:0 22px}
.pipeline::before{content:"$ ";color:var(--neon)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.step{padding:34px 32px}
.idx{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:20px;letter-spacing:.18em;color:var(--amber);display:block;margin-bottom:14px}
.step h2{font-size:38px;margin-bottom:12px}
.step p{font-size:23px;color:var(--muted);line-height:1.95}
</style></head>
<body class="t-hud sz-x">
<div class="card">
  <p class="pipeline">plan<span class="pipe">|</span>drive<span class="pipe">|</span>archive</p>
  <div class="steps">
    <div class="step bracket">
      <span class="idx">STEP 01</span>
      <h2>計画する</h2>
      <p>行きたいスポットにピンを並べ、日ごとの順路でつなぐ。長距離の立ち寄りも一枚の旅程に。</p>
    </div>
    <div class="step bracket">
      <span class="idx">STEP 02</span>
      <h2>走る</h2>
      <p>旅程どおりに走って、立ち寄った場所を記録。予定外の寄り道も、その場でpush。</p>
    </div>
    <div class="step bracket">
      <span class="idx">STEP 03</span>
      <h2>残る</h2>
      <p>帰るころには、旅行がまるごと一枚の地図に。次の旅を考えるときに見返せる。</p>
    </div>
  </div>
</div>
<footer class="brand-strip"><span class="mark">&gt;_</span><span>michip — ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">$ join --beta</span></footer>
</body></html>
