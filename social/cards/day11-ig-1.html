<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;gap:40px}
.stepno{font-size:30px;letter-spacing:.2em;display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:6px 30px;transform:rotate(-1.5deg);align-self:flex-start;box-shadow:5px 5px 0 rgba(59,56,49,.15)}
h1{font-size:78px;line-height:1.5}
.body{font-size:30px;color:#5d584c;line-height:2;max-width:15em}
.pins{display:flex;gap:34px;align-items:center;margin-top:10px}
.pin{width:44px;height:44px;border-radius:50%;background:var(--red);border:5px solid #fbf6e8;box-shadow:0 0 0 4px var(--red)}
.pins svg{flex:1;height:40px}
.pins path{fill:none;stroke:var(--red);stroke-width:6;stroke-linecap:round;stroke-dasharray:2 16}
</style></head>
<body class="t-note sz-ig">
<div class="card">
  <span class="stepno">つかいかた 1/3</span>
  <h1><span class="hl">計画する</span></h1>
  <p class="body">行きたいスポットにピンを並べて、日ごとの順路でつなぐ。長距離の立ち寄りも、1枚の旅程になる。</p>
  <div class="pins"><span class="pin"></span><svg viewBox="0 0 400 40"><path d="M10 26 C110 8 290 34 390 14"/></svg><span class="pin"></span></div>
</div>
<footer class="brand-strip"><span class="mark">記</span><span>ミチップ</span><span class="url">計画して、走って、残す。</span><span class="cta">1/3</span></footer>
</body></html>
