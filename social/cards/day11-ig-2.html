<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;gap:40px}
.stepno{font-size:30px;letter-spacing:.2em;display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:6px 30px;transform:rotate(-1.5deg);align-self:flex-start;box-shadow:5px 5px 0 rgba(59,56,49,.15)}
h1{font-size:78px;line-height:1.5}
.body{font-size:30px;color:#5d584c;line-height:2;max-width:15em}
.road{height:120px;position:relative;margin-top:10px}
.road svg{width:100%;height:100%}
.road .asphalt{fill:none;stroke:#5f594a;stroke-width:38;stroke-linecap:round}
.road .center{fill:none;stroke:#fbf6e8;stroke-width:5;stroke-dasharray:30 24}
.road circle{fill:var(--red);stroke:#fbf6e8;stroke-width:5}
</style></head>
<body class="t-note sz-ig">
<div class="card">
  <span class="stepno">つかいかた 2/3</span>
  <h1><span class="hl">走る</span></h1>
  <p class="body">旅程どおりに走って、立ち寄った場所を記録。予定外の寄り道も、その場でピンとして残せる。</p>
  <div class="road">
    <svg viewBox="0 0 900 120">
      <path class="asphalt" d="M30 84 C230 40 620 104 870 56"/>
      <path class="center" d="M30 84 C230 40 620 104 870 56"/>
      <circle cx="300" cy="63" r="14"/>
      <circle cx="650" cy="86" r="14"/>
    </svg>
  </div>
</div>
<footer class="brand-strip"><span class="mark">記</span><span>ミチップ</span><span class="url">計画して、走って、残す。</span><span class="cta">2/3</span></footer>
</body></html>
