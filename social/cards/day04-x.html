<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{gap:26px}
h1{font-size:56px;text-align:center}
.grid{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:22px;min-height:0}
.cell{border:5px solid var(--ink);box-shadow:8px 8px 0 var(--ink);overflow:hidden;background:#fffdf6;position:relative}
.cell img{width:100%;height:100%;object-fit:cover;object-position:top left;display:block}
.cell:nth-child(2){transform:rotate(.6deg)}
.cell:nth-child(4){transform:rotate(-.6deg)}
.cap{text-align:center;font-family:"Yusei Magic",sans-serif;font-size:26px}
.cap b{color:var(--red)}
</style></head>
<body class="t-manga sz-x">
<div class="card">
  <h1>開くたび、デザイン<em>変わるんかい</em>。</h1>
  <div class="grid">
    <div class="cell"><img src="assets/v1-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v2-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v3-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v4-hero.png" alt=""></div>
    <div class="cell"><img src="assets/v5-hero.png" alt=""></div>
  </div>
  <p class="cap">銭湯・旅ノート・ツッコミ・緑看板・走行ログ。全5種、<b>中身はおなじサービスやねん</b>。</p>
</div>
<footer class="brand-strip"><span class="mark">ツ</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">デザインガチャは右下や</span></footer>
</body></html>
