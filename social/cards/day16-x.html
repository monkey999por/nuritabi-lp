<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{flex-direction:row;gap:60px;align-items:center;justify-content:center}
.ticket{width:640px;padding:44px 48px 40px 76px;transform:rotate(-1.2deg);position:relative}
.ticket .t1{font-size:44px;font-weight:800;color:var(--red-deep);letter-spacing:.12em;display:block}
.ticket .t2{font-size:22px;color:#8a7a55;letter-spacing:.2em;display:block;margin-top:8px}
.ticket .free{position:absolute;right:-26px;top:-30px;width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-family:"Yuji Syuku",serif;font-size:30px;color:var(--red);border:4px solid var(--red);background:rgba(251,245,230,.95);transform:rotate(12deg)}
.right{max-width:660px}
.qa{margin-bottom:26px}
.qa dt{display:flex;gap:14px;align-items:baseline;font-size:30px;font-weight:800;color:var(--indigo-deep)}
.qa dt::before{content:"問";flex:none;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:22px;background:var(--indigo);color:#fbf5e6;transform:translateY(6px)}
.qa dd{font-size:25px;color:#4c5364;margin-top:6px;padding-left:58px}
.qa dd b{color:var(--red-deep)}
</style></head>
<body class="t-retro sz-x">
<div class="card">
  <div class="ticket">
    <span class="free">無料</span>
    <span class="t1">β事前登録 乗車券</span>
    <span class="t2">下車前途無効 — メール一本・十秒で発券</span>
  </div>
  <dl class="right">
    <div class="qa"><dt>料金はかかりますか？</dt><dd>基本は<b>無料</b>で使える予定です。</dd></div>
    <div class="qa"><dt>アプリの導入は？</dt><dd><b>不要</b>。スマホ・PCのブラウザからそのまま。</dd></div>
    <div class="qa"><dt>登録には何が要りますか？</dt><dd><b>メールアドレスひとつ</b>。十秒で終わります。</dd></div>
  </dl>
</div>
<footer class="brand-strip"><span class="mark">道</span><span>ミチップ</span><span class="url">michip-lp.pages.dev</span><span class="cta">β事前登録 承り中</span></footer>
</body></html>
