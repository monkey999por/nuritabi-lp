<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Yuji+Syuku&display=swap" rel="stylesheet">
<link rel="stylesheet" href="themes.css">
<style>
.card{justify-content:center;align-items:center}
.pc{width:100%;background:#fffdf4;border:2px solid var(--line);padding:20px 20px 0;box-shadow:0 26px 52px rgba(43,50,66,.22);transform:rotate(.7deg);position:relative}
.pc::after{content:"MICHIP・道";position:absolute;top:14px;right:18px;width:104px;height:104px;border-radius:50%;display:grid;place-items:center;font-size:16px;font-weight:700;letter-spacing:.1em;color:rgba(38,69,107,.55);border:3px solid rgba(38,69,107,.45);transform:rotate(-14deg);z-index:2}
.scene{height:520px;background:linear-gradient(180deg,#e3ecf2 0%,#d3e0dd 55%,#94a98e 55.5%,#75906f 100%);position:relative;overflow:hidden;border:2px solid rgba(38,69,107,.18)}
.scene svg{position:absolute;inset:0;width:100%;height:100%}
h1{font-size:46px;text-align:center;padding:26px 0 8px;color:var(--indigo-deep)}
.body{font-size:25px;color:#4c5364;text-align:center;padding-bottom:26px;line-height:1.9}
</style></head>
<body class="t-retro sz-ig">
<div class="card">
  <div class="pc">
    <div class="scene">
      <svg viewBox="0 0 900 520" preserveAspectRatio="none">
        <path d="M450 62 C412 100 396 146 396 200 L396 400 L504 400 L504 200 C504 146 488 100 450 62 Z" fill="#9fb0a4"/>
        <ellipse cx="450" cy="80" rx="28" ry="32" fill="#9fb0a4"/>
        <path d="M396 228 Q450 262 504 228" fill="none" stroke="#7d9184" stroke-width="6"/>
        <path d="M0 448 H900" stroke="#5c5648" stroke-width="46"/>
        <path d="M0 448 H900" stroke="#fbf5e6" stroke-width="6" stroke-dasharray="52 38"/>
        <circle cx="656" cy="448" r="15" fill="#c23524" stroke="#fbf5e6" stroke-width="5"/>
      </svg>
    </div>
    <h1>国道沿いの巨大観音</h1>
    <p class="body">通り過ぎる予定だった場所ほど、<br>あとで話したくなる。</p>
  </div>
</div>
<footer class="brand-strip"><span class="mark">道</span><span>ミチップ</span><span class="url">映えなくて、結構。</span><span class="cta">2/3</span></footer>
</body></html>
