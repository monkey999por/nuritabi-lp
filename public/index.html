<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ミチップ— ピンをつないで、旅行記録を完成させる。</title>
<meta name="description" content="スポットにピンを立て、ピンとピンを道順の線でつなぐ。旅行単位・日単位の記録が一枚の地図に残る、ロングドライブのための旅程記録サービス。">
<!-- OGP はローダーに置く（クローラは JS を実行しないため、共有カードはここから出る）。
     カスタムドメイン移行時は og:url / og:image を差し替え -->
<meta property="og:type" content="website">
<meta property="og:title" content="ミチップ— ピンをつないで、旅行記録を完成させる。">
<meta property="og:description" content="スポットにピンを立て、ピンとピンを道順の線でつなぐ。旅行単位・日単位の記録が一枚の地図に残る、ロングドライブのための旅程記録サービス。">
<meta property="og:url" content="https://michip-lp.pages.dev/">
<meta property="og:image" content="https://michip-lp.pages.dev/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='3' fill='%23E05A3F'/%3E%3C/svg%3E">
<style>body{margin:0;background:#0E141E}</style>
</head>
<body>
<script>
// 開くたびに違うデザインへ振り分けるマイクロローダー
// ?v=N で固定（SNS 投稿でターゲット別に出し分ける用）。指定なしは前回と違うものをランダム
(function(){
  var N=5; // build.mjs が実数に置換
  var KEY="michip.lastv";
  var q=+(new URLSearchParams(location.search).get("v")||0);
  var v=(q>=1&&q<=N)?q:0;
  if(!v){
    var last=0;
    try{last=+(localStorage.getItem(KEY)||0)}catch(e){}
    do{v=1+Math.floor(Math.random()*N)}while(N>1&&v===last);
  }
  try{localStorage.setItem(KEY,String(v))}catch(e){}
  location.replace("v"+v+".html"+location.hash);
})();
</script>
<noscript>
  <p style="color:#E9EEF4;font-family:sans-serif;padding:24px">
    ミチップ— ピンをつないで、旅行記録を完成させる。<br>
    <a href="v1.html" style="color:#F0A63A">ページを開く</a>
  </p>
</noscript>
</body>
</html>
